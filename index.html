<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raíz Turismo — Presentación para accionistas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="viewport"><div id="stage"></div></div>

<button class="arrow" id="prev">&lsaquo;</button>
<button class="arrow" id="next">&rsaquo;</button>
<div id="dots"></div>
<div id="counter"></div>

<!-- Lista ordenada de diapositivas (editá slides/manifest.js para agregar/reordenar) -->
<script src="slides/manifest.js"></script>

<!-- Cargador: trae cada fragmento de slides/, lo inserta y arranca la navegación -->
<script>
(function(){
  var stage=document.getElementById('stage');
  var list=window.SLIDES||[];

  // Carga todos los fragmentos en paralelo, preservando el orden del manifiesto.
  Promise.all(list.map(function(file){
    return fetch('slides/'+file).then(function(r){
      if(!r.ok) throw new Error('No se pudo cargar slides/'+file+' ('+r.status+')');
      return r.text();
    }).catch(function(err){
      console.error(err);
      return '<section class="slide center"><h2 style="color:#c0392b">Error cargando<br>'+file+'</h2></section>';
    });
  })).then(function(fragments){
    stage.innerHTML=fragments.join('\n');
    initDeck();
  });

  function initDeck(){
    var slides=[].slice.call(stage.querySelectorAll('.slide'));
    var dotsWrap=document.getElementById('dots');
    var counter=document.getElementById('counter');
    var i=0,n=slides.length;
    slides.forEach(function(_,k){var b=document.createElement('button');b.className='dot'+(k===0?' on':'');b.onclick=function(){go(k)};dotsWrap.appendChild(b)});
    var dots=[].slice.call(dotsWrap.children);
    function pad(x){return String(x+1).padStart(2,'0')}
    function render(){slides.forEach(function(s,k){var a=k===i;s.classList.toggle('active',a);var v=s.querySelector('video');if(v){if(a){try{v.currentTime=0;v.play()}catch(e){}}else{v.pause()}}});dots.forEach(function(d,k){d.classList.toggle('on',k===i)});counter.textContent=pad(i)+' / '+String(n).padStart(2,'0')}
    function go(k){i=Math.max(0,Math.min(n-1,k));render()}
    function next(){if(i<n-1)go(i+1)}
    function prev(){if(i>0)go(i-1)}
    document.getElementById('next').onclick=next;
    document.getElementById('prev').onclick=prev;
    window.addEventListener('keydown',function(e){
      if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}
      else if(e.key==='ArrowLeft'){e.preventDefault();prev()}
      else if(e.key==='Home'){go(0)}else if(e.key==='End'){go(n-1)}
    });
    function fit(){var iw=innerWidth,ih=innerHeight,s=Math.min(iw/1920,ih/1080);stage.style.transform='translate('+((iw-1920*s)/2)+'px,'+((ih-1080*s)/2)+'px) scale('+s+')'}
    window.addEventListener('resize',fit);fit();render();
  }
})();
</script>
</body>
</html>
